<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Odin Tic-tac-toe</title>
</head>
<body>
    <script src="script.js" defer></script>
    <main>
        <h1>Tic-tac-toe</h1>

        <div id="scoreboard">
            <div id="round"><p>Round</p><p id="round-counter">1</p></div>

            <div id="player-one">
                <p class="player-header">Player 1</p>
                <p>Player Name: 
                    <span id="p1-name" class="name"></span>
                    <input id="p1-name-input" class="name-input" type="text" maxlength="16" placeholder="Player 1 Name">
                    <button type="button" class="name-button" id="set-p1">Confirm Player 1 Name</button>
                </p>
                <p>Player symbol: <img src="./images/cross.png" class="player-marker"></p>
                <div class="color-picker">
                    <p>Player Color:</p>
                    <label for="p1-red">
                        <input type="radio" id="p1-red" class="hidden" name="p1-color" checked>
                        <div class="color-choice red"></div>
                    </label>
                    <label for="p1-orange">
                        <input type="radio" id="p1-orange" class="hidden" name="p1-color">
                        <div class="color-choice orange"></div>
                    </label>
                    <label for="p1-yellow">
                        <input type="radio" id="p1-yellow" class="hidden" name="p1-color">
                        <div class="color-choice yellow"></div>
                    </label>
                    <label for="p1-green">
                        <input type="radio" id="p1-green" class="hidden" name="p1-color">
                        <div class="color-choice green"></div>
                    </label>
                    <label for="p1-blue">
                        <input type="radio" id="p1-blue" class="hidden" name="p1-color">
                        <div class="color-choice blue"></div>
                    </label>
                    <label for="p1-indigo">
                        <input type="radio" id="p1-indigo" class="hidden" name="p1-color">
                        <div class="color-choice indigo"></div>
                    </label>
                    <label for="p1-violet">
                        <input type="radio" id="p1-violet" class="hidden" name="p1-color">
                        <div class="color-choice violet"></div>
                    </label>
                </div>
                <p>Player 1 score: <span id="p1-score-counter">0</span></p>
            </div>

            <div id="player-two">
                <p class="player-header">Player 2</p>
                <p>Player Name: 
                    <span id="p2-name" class="name"></span>
                    <input id="p2-name-input" class="name-input" type="text" maxlength="16" placeholder="Player 2 Name">
                    <button type="button" class="name-button" id="set-p2">Confirm Player 2 Name</button>
                </p>
                <p>Player symbol: <img src="./images/naught.png" class="player-marker"></p>
                <div class="color-picker">
                    <p>Player Color:</p>
                    <label for="p2-red">
                        <input type="radio" id="p2-red" class="hidden" name="p2-color">
                        <div class="color-choice red"></div>
                    </label>
                    <label for="p2-orange">
                        <input type="radio" id="p2-orange" class="hidden" name="p2-color">
                        <div class="color-choice orange"></div>
                    </label>
                    <label for="p2-yellow">
                        <input type="radio" id="p2-yellow" class="hidden" name="p2-color">
                        <div class="color-choice yellow"></div>
                    </label>
                    <label for="p2-green">
                        <input type="radio" id="p2-green" class="hidden" name="p2-color">
                        <div class="color-choice green"></div>
                    </label>
                    <label for="p2-blue">
                        <input type="radio" id="p2-blue" class="hidden" name="p2-color" checked>
                        <div class="color-choice blue"></div>
                    </label>
                    <label for="p2-indigo">
                        <input type="radio" id="p2-indigo" class="hidden" name="p2-color">
                        <div class="color-choice indigo"></div>
                    </label>
                    <label for="p2-violet">
                        <input type="radio" id="p2-violet" class="hidden" name="p2-color">
                        <div class="color-choice violet"></div>
                    </label>
                </div>
                <p>Player 2 score: <span id="p2-score-counter">0</span></p>
            </div>
        </div>

        <div id="arena">
            <div class="position x=0 y=0"></div>
            <div class="position x=0 y=1"></div>
            <div class="position x=0 y=2"></div>
            <div class="position x=1 y=0"></div>
            <div class="position x=1 y=1"></div>
            <div class="position x=1 y=2"></div>
            <div class="position x=2 y=0"></div>
            <div class="position x=2 y=1"></div>
            <div class="position x=2 y=2"></div>
        </div>

        <div id="end-round-container" class="hidden">
            <p id="announcement"></p>
            <button type="button" id="next-round">Next round</button>
            <button type="button" id="reset-game">Reset game</button>
        </div>
    </main>

</body>
</html>
